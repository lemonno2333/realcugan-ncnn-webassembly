name: Build Real-CUGAN WebAssembly

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git cmake make g++ python3 nodejs npm

      - name: Clone upstream repository with submodules
        run: |
          git clone https://github.com/hanFengSan/realcugan-ncnn-webassembly.git source
          cd source
          git submodule sync --recursive
          git submodule update --init --recursive
          echo "===== root files ====="
          ls -lah
          echo "===== submodule check ====="
          test -d fmt && echo "fmt exists" || echo "fmt missing"
          test -d ncnn && echo "ncnn exists" || echo "ncnn missing"
          ls -lah fmt || true
          ls -lah ncnn || true

      - name: Install Emscripten 3.1.13
        run: |
          git clone https://github.com/emscripten-core/emsdk.git ~/emsdk
          cd ~/emsdk
          ./emsdk install 3.1.13
          ./emsdk activate 3.1.13

      - name: Build project
        run: |
          source ~/emsdk/emsdk_env.sh
          cd source
          sh build.sh

      - name: List build result
        run: |
          cd source
          echo "===== web files ====="
          ls -lah web
          find web -maxdepth 2 -type f | head -100

      - name: Pack web folder
        run: |
          cd source
          tar -czvf ../realcugan-web.tar.gz web

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: realcugan-web
          path: realcugan-web.tar.gz
          retention-days: 7
